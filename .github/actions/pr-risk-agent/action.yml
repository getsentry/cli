name: PR Risk Agent
description: Score the current pull request with a precomputed PR risk model.

inputs:
  repo:
    description: GitHub repository as owner/name.
    required: true
  pr-number:
    description: Pull request number.
    required: true
  history:
    description: Raw historical PR JSONL or JSONL.GZ path in the checked-out target repo.
    required: true
  model:
    description: Saved risk-pr model JSON path in the checked-out target repo.
    required: true
  result-path:
    description: JSON result output path.
    required: false
    default: risk-pr-result.json
  skip-reviews:
    description: Skip fetching current PR reviews.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install risk-pr-agent
      shell: bash
      run: python -m pip install -e "$GITHUB_ACTION_PATH"

    - name: Score PR risk
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        SKIP_REVIEWS=""
        if [ "${{ inputs.skip-reviews }}" = "true" ]; then
          SKIP_REVIEWS="--skip-reviews"
        fi

        risk-pr score-pr \
          --repo "${{ inputs.repo }}" \
          --pr "${{ inputs.pr-number }}" \
          --history "${{ inputs.history }}" \
          --model "${{ inputs.model }}" \
          --out "${{ inputs.result-path }}" \
          --summary-file "$GITHUB_STEP_SUMMARY" \
          $SKIP_REVIEWS
