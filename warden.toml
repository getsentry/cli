version = 1

[defaults]
failOn = "high"
reportOn = "medium"
ignorePaths = ["**/node_modules/**", "**/bun.lock", "docs/**"]

[[skills]]
name = "find-warden-bugs"
paths = ["src/**/*.ts", "src/**/*.tsx"]
ignorePaths = ["src/generated/**", "src/sdk.generated.*"]

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened", "ready_for_review"]
